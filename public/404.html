<title>Redirect</title>
<script>
  var path = window.location.pathname;
  var repo = "/site-pizzaria/";
  if (path.startsWith(repo)) {
    window.location.replace(repo + "?redirect=" + path.replace(repo, ""));
  }
</script>
</head>
