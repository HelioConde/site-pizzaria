<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Redirecting...</title>
  <script>
    (function () {
      var repo = "/site-pizzaria/";
      var path = window.location.pathname;

      if (path.startsWith(repo)) {
        var redirectPath = path.slice(repo.length);
        window.location.replace(repo + "?redirect=" + encodeURIComponent(redirectPath));
      }
    })();
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
